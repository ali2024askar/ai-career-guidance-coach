{% extends "base.html" %}

{% block title %}Sign in · AI Career Guidance Coach{% endblock %}

{% block content %}
<div class="pf-page pf-page--centered">
    <div class="pf-wrap pf-wrap--sm">
        <div class="pf-card">
            <h1>Sign in</h1>
            <p class="pf-form-help">Enter your credentials to access your career roadmap and progress.</p>
            {% if error %}
                <div class="pf-alert">{{ error }}</div>
            {% endif %}
            <form class="pf-form" method="post" novalidate>
                {% csrf_token %}
                <div class="pf-field">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" class="pf-input" value="{{ form.email|default_if_none:'' }}" required>
                </div>
                <div class="pf-field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" class="pf-input" required>
                </div>
                <div class="pf-form__actions">
                    <button type="submit" class="pf-btn pf-btn--primary">Sign in</button>
                    <a href="{% url 'accounts:signup' %}" class="pf-btn pf-btn--ghost">Create an account</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
